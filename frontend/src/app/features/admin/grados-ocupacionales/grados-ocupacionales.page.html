<ion-header [translucent]="true">
    <ion-toolbar color="primary">
        <ion-buttons slot="start">
            <ion-menu-button></ion-menu-button>
        </ion-buttons>
        <ion-title>Gestión de Grados Ocupacionales</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
    <div class="admin-container">
        <ion-card class="welcome-card">
            <ion-card-header>
                <div class="header-flex">
                    <div>
                        <ion-card-subtitle>Administración de Catálogos</ion-card-subtitle>
                        <ion-card-title>Grados Ocupacionales</ion-card-title>
                    </div>
                    <ion-button color="success" (click)="iraCrearGrado()">
                        <ion-icon slot="start" name="add-circle-outline"></ion-icon>
                        Nuevo Grado
                    </ion-button>
                </div>
            </ion-card-header>

            <ion-card-content>
                <div class="search-bar">
                    <ion-item lines="none" class="search-item">
                        <ion-icon name="search-outline" slot="start"></ion-icon>
                        <ion-input placeholder="Buscar grado ocupacional..." [(ngModel)]="searchTerm"
                            (ionInput)="filterGrados()" [debounce]="300"></ion-input>
                    </ion-item>
                </div>

                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let g of filteredGrados">
                                <td>{{ g.id }}</td>
                                <td>
                                    <div class="display-flex align-center">
                                        <ion-icon name="ribbon-outline" color="primary"
                                            class="ion-margin-end"></ion-icon>
                                        {{ g.nombre }}
                                    </div>
                                </td>
                                <td>
                                    <ion-button fill="clear" color="primary" (click)="iraEditarGrado(g.id)">
                                        <ion-icon slot="icon-only" name="create-outline"></ion-icon>
                                    </ion-button>
                                    <ion-button fill="clear" color="danger" (click)="confirmarEliminar(g.id)">
                                        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
                                    </ion-button>
                                </td>
                            </tr>
                            <tr *ngIf="filteredGrados.length === 0">
                                <td colspan="3" class="ion-text-center">No se encontraron resultados</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </ion-card-content>
        </ion-card>
    </div>
</ion-content>
