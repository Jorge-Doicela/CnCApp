<ion-header class="ion-no-border">
  <ion-toolbar
    style="--background: #ffffff; border-bottom: 2px solid #f1f5f9; --min-height: 110px; height: 110px; position: relative;">

    <div
      style="width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px 0 20px;">

      <!-- Left: Logo -->
      <div style="display: flex; align-items: center; gap: 4px; flex: 0 0 auto;">
        <ion-menu-button style="color: #475569; margin: 0; --padding-start: 0;"></ion-menu-button>
        <div style="display: flex; align-items: center; gap: 10px;">
          <img src="assets/icon/cnc-logo.png" style="width: 28px; height: 28px; object-fit: contain;" alt="CNC" />
          <div style="border-left: 1px solid #e2e8f0; padding-left: 12px; line-height: 1.15;">
            <div style="font-weight: 900; color: #1e3a8a; font-size: 1rem; letter-spacing: -0.5px;">CNC</div>
            <div
              style="font-size: 0.65rem; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">
              Ecuador</div>
          </div>
        </div>
      </div>

      <!-- CENTER: Encapsulated Navigation (Desktop Only) -->
      <div class="desktop-nav-container">
        <div class="encased-pill-system">
          <div (click)="navegarModulo('historia')" class="encased-item">Historia</div>
          <div (click)="navegarModulo('servi-progra')" class="encased-item">Servicios</div>
          <div (click)="navegarModulo('validar-certificados')" class="encased-item">Verificación</div>
        </div>
      </div>

      <!-- Right: Encapsulated Auth/User -->
      <div style="display: flex; align-items: center; gap: 15px; flex: 0 0 auto; justify-content: flex-end;">

        <!-- Guest: Image Style Encapsulated Auth -->
        <ng-container *ngIf="isGuest()">
          <div class="encased-auth-frame desktop-nav-container">
            <div (click)="iraLogin()" class="auth-box login">
              <ion-icon name="log-in-outline"></ion-icon>
              <span>Entrar</span>
            </div>
            <div (click)="iraRegistro()" class="auth-box register">
              <ion-icon name="person-add-outline"></ion-icon>
              <span>Crear Cuenta</span>
            </div>
          </div>

          <!-- Mobile Login Only -->
          <ion-button *ngIf="isGuest()" (click)="iraLogin()" class="mobile-only-btn login-button">
            Entrar
          </ion-button>
        </ng-container>

        <!-- Logged In User -->
        <ng-container *ngIf="!isGuest()">
          <div (click)="navegarModulo('Ver Perfil')" class="user-encased">
            <div class="user-avatar-circle">{{ (userName() || 'U').charAt(0).toUpperCase() }}</div>
            <span class="user-label">{{ (userName() || '').split(' ')[0] }}</span>
          </div>
          <ion-button (click)="cerrarSesion()" style="--color: #ef4444; margin: 0;">
            <ion-icon slot="icon-only" name="log-out-outline" style="font-size: 1.5rem;"></ion-icon>
          </ion-button>
        </ng-container>

      </div>

    </div>

    <!-- Bottom spacing for Android safety -->
  </ion-toolbar>
</ion-header>

<style>
  /* Base Desktop Container Control */
  .desktop-nav-container {
    display: flex;
    align-items: center;
    height: 100%;
  }

  /* Center Navigation - Encased Style */
  .encased-pill-system {
    display: flex;
    align-items: center;
    background: #f1f5f9;
    /* Light frame */
    padding: 4px;
    border-radius: 999px;
    border: 1px solid rgba(0, 0, 0, 0.03);
    gap: 4px;
  }

  .encased-item {
    padding: 8px 20px;
    font-size: 0.85rem;
    font-weight: 700;
    color: #475569;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .encased-item:hover {
    background: #ffffff;
    color: #1e3a8a;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.06);
    transform: translateY(-1px);
  }

  /* Right Side Auth - "Encerrados" Style from Image */
  .encased-auth-frame {
    display: flex;
    align-items: center;
    background: #f1f5f9;
    padding: 5px;
    border-radius: 999px;
    border: 1px solid rgba(0, 0, 0, 0.03);
    gap: 8px;
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
  }

  .auth-box {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    cursor: pointer;
    border-radius: 999px;
    font-weight: 800;
    font-size: 0.8rem;
    transition: all 0.3s ease;
  }

  .auth-box ion-icon {
    font-size: 1.2rem;
  }

  /* Login Styling */
  .auth-box.login {
    color: #1e3a8a;
  }

  .auth-box.login:hover {
    background: rgba(255, 255, 255, 0.6);
  }

  /* Register Styling - Highlighted */
  .auth-box.register {
    background: #ffffff;
    color: #1e3a8a;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
  }

  .auth-box.register:hover {
    transform: scale(1.03);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
  }

  /* User Pill Stylized */
  .user-encased {
    display: flex;
    align-items: center;
    background: #f1f5f9;
    padding: 3px 15px 3px 3px;
    border-radius: 999px;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .user-avatar-circle {
    background: #1e3a8a;
    color: white;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 0.9rem;
    box-shadow: 0 2px 5px rgba(30, 58, 138, 0.3);
  }

  .user-label {
    font-weight: 800;
    font-size: 0.8rem;
    color: #1e3a8a;
    text-transform: uppercase;
  }

  /* Mobile Control */
  .mobile-only-btn {
    display: none;
  }

  @media (max-width: 1100px) {
    .desktop-nav-container {
      display: none !important;
    }

    .mobile-only-btn {
      display: block !important;
    }
  }

  .login-button {
    --background: #1e3a8a;
    --color: #ffffff;
    --border-radius: 999px;
    font-weight: 800;
    height: 34px;
    margin: 0;
  }
</style>
