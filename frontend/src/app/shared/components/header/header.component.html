<ion-header class="ion-no-border">
  <ion-toolbar
    style="--background: #ffffff; border-bottom: 2.5px solid #f1f5f9; --min-height: 92px; height: 92px; position: relative;">

    <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 24px;">

      <!-- Left: Brand (CNC) -->
      <div style="display: flex; align-items: center; gap: 6px; flex: 0 0 auto;">
        <ion-menu-button style="color: #475569; margin: 0; --padding-start: 0;"></ion-menu-button>
        <div style="border-left: 2.5px solid #1e3a8a; padding-left: 12px; line-height: 1.1; margin-left: 5px;">
          <div style="font-weight: 900; color: #1e3a8a; font-size: 1.0rem; letter-spacing: -0.4px;">CNC</div>
          <div
            style="font-size: 0.65rem; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">
            Ecuador</div>
        </div>
      </div>

      <!-- CENTER: Encapsulated Navigation -->
      <div class="desktop-only" style="display: flex; justify-content: center; flex: 1; padding: 0 20px;">
        <div class="encased-pill-system">
          <div (click)="navegarModulo('/')" class="encased-item" [class.active]="isActive('/')">Inicio</div>
          <div (click)="navegarModulo('historia')" class="encased-item" [class.active]="isActive('historia')">Historia
          </div>
          <div (click)="navegarModulo('direccion')" class="encased-item" [class.active]="isActive('direccion')">
            Dirección</div>
          <div (click)="navegarModulo('norma-regul')" class="encased-item" [class.active]="isActive('norma-regul')">
            Normativa</div>
          <div (click)="navegarModulo('informacion')" class="encased-item" [class.active]="isActive('informacion')">
            Información</div>
          <div (click)="navegarModulo('servi-progra')" class="encased-item" [class.active]="isActive('servi-progra')">
            Servicios</div>
          <div class="nav-separator"></div>
          <div (click)="navegarModulo('validar-certificados')" class="encased-item"
            [class.active]="isActive('validar-certificados')">Verificación</div>
        </div>
      </div>

      <!-- Right: Encapsulated Auth/User -->
      <div style="display: flex; align-items: center; gap: 12px; flex: 0 0 auto; justify-content: flex-end;">

        <!-- Guest: Encapsulated Auth -->
        <ng-container *ngIf="isGuest()">
          <div class="encased-auth-frame desktop-only">
            <div (click)="iraLogin()" class="auth-box login">
              <span>Iniciar Sesión</span>
              <ion-icon name="log-in-outline"></ion-icon>
            </div>
            <div (click)="iraRegistro()" class="auth-box register">
              <span>Registrarse</span>
              <ion-icon name="person-add-outline"></ion-icon>
            </div>
          </div>

          <!-- Mobile Login Button -->
          <div *ngIf="isGuest()" class="mobile-only-btn-frame">
            <div (click)="iraLogin()" class="auth-box login" style="padding: 10px;">
              <ion-icon name="log-in-outline" style="font-size: 1.3rem;"></ion-icon>
            </div>
          </div>
        </ng-container>

        <!-- Logged In User -->
        <ng-container *ngIf="!isGuest()">
          <div (click)="navegarModulo('Ver Perfil')" class="user-encased">
            <div class="user-avatar-circle">{{ (userName() || 'U').charAt(0).toUpperCase() }}</div>
            <span class="user-label">{{ (userName() || '').split(' ')[0] }}</span>
          </div>
          <ion-button (click)="cerrarSesion()"
            style="--color: #ef4444; margin: 0; --padding-start: 6px; --padding-end: 6px;">
            <ion-icon slot="icon-only" name="log-out-outline" style="font-size: 1.4rem;"></ion-icon>
          </ion-button>
        </ng-container>

      </div>

    </div>
  </ion-toolbar>
</ion-header>

<style>
  /* Navigation Central - Balanced Style */
  .encased-pill-system {
    display: flex;
    align-items: center;
    background: #f1f5f9;
    padding: 4px;
    border-radius: 999px;
    border: 1px solid #e2e8f0;
    gap: 3px;
  }

  .encased-item {
    padding: 8px 18px;
    font-size: 0.8rem;
    font-weight: 700;
    color: #64748b;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .encased-item.active {
    background: #ffffff;
    color: #1e3a8a;
    border: 1.5px solid #cbd5e1;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    transform: scale(1.02);
  }

  .encased-item:hover:not(.active) {
    background: rgba(255, 255, 255, 0.6);
    color: #1e3a8a;
  }

  .nav-separator {
    width: 1px;
    height: 20px;
    background: #cbd5e1;
    margin: 0 6px;
    opacity: 0.7;
  }

  /* Right Side Auth - Balanced */
  .encased-auth-frame {
    display: flex;
    align-items: center;
    background: #f8fafc;
    padding: 4px;
    border-radius: 999px;
    border: 1px solid #e2e8f0;
    gap: 3px;
  }

  .auth-box {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    cursor: pointer;
    border-radius: 999px;
    font-weight: 800;
    font-size: 0.78rem;
    transition: all 0.2s ease;
  }

  .auth-box.login {
    color: #1e3a8a;
  }

  .auth-box.login ion-icon {
    font-size: 1.05rem;
  }

  .auth-box.login:hover {
    background: rgba(30, 58, 138, 0.05);
  }

  .auth-box.register {
    background: #1e3a8a;
    color: #ffffff;
    box-shadow: 0 3px 10px rgba(30, 58, 138, 0.18);
  }

  .auth-box.register ion-icon {
    font-size: 0.95rem;
  }

  .auth-box.register:hover {
    background: #1e40af;
    box-shadow: 0 5px 15px rgba(30, 58, 138, 0.28);
    transform: translateY(-1px);
  }

  /* User Section */
  .user-encased {
    display: flex;
    align-items: center;
    background: #f1f5f9;
    padding: 4px 15px 4px 4px;
    border-radius: 999px;
    gap: 10px;
    cursor: pointer;
  }

  .user-avatar-circle {
    background: #1e3a8a;
    color: white;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 0.85rem;
  }

  .user-label {
    font-weight: 800;
    font-size: 0.78rem;
    color: #1e3a8a;
    text-transform: uppercase;
  }

  /* Responsive Constraints */
  .desktop-only {
    display: flex;
  }

  @media (max-width: 1200px) {
    .desktop-only {
      display: none !important;
    }
  }
</style>
