<ion-header class="ion-no-border">
  <ion-toolbar
    style="--background: #ffffff; border-bottom: 2px solid #edeff3; --min-height: 110px; height: 110px; position: relative; --padding-top: 0; --padding-bottom: 0;">

    <!-- Row: Buttons and Branding at the VERY TOP -->
    <div
      style="width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 12px 0 12px;">

      <!-- Left: Simple Menu + Clean CNC Brand -->
      <div style="display: flex; align-items: center; gap: 4px;">
        <ion-menu-button style="color: #475569; margin: 0; --padding-start: 0;"></ion-menu-button>
        <div style="display: flex; align-items: center; gap: 8px;">
          <img src="assets/icon/cnc-logo.png" style="width: 24px; height: 24px; object-fit: contain;" alt="CNC" />
          <div style="border-left: 1px solid #e2e8f0; padding-left: 10px; line-height: 1.1;">
            <div style="font-weight: 800; color: #1e3a8a; font-size: 0.85rem; letter-spacing: -0.5px;">CNC</div>
            <div style="font-size: 0.6rem; color: #64748b; font-weight: 500;">Ecuador</div>
          </div>
        </div>
      </div>

      <!-- Right: User Pill and Logout -->
      <div style="display: flex; align-items: center; gap: 6px;">
        <ng-container *ngIf="!isGuest()">
          <!-- Pill -->
          <div (click)="navegarModulo('Ver Perfil')"
            style="display: flex; align-items: center; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 999px; padding: 2px 10px 2px 2px; gap: 8px; cursor: pointer; height: 26px;">
            <div
              style="background: #1e3a8a; color: #ffffff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.7rem;">
              {{ (userName() || 'U').charAt(0).toUpperCase() }}
            </div>
            <span style="font-weight: 800; font-size: 0.7rem; color: #1e3a8a; text-transform: uppercase;">
              {{ (userName() || '').split(' ')[0] }}
            </span>
          </div>
          <!-- Logout Button (Red Icon) -->
          <ion-button (click)="cerrarSesion()"
            style="--color: #ef4444; margin: 0; --padding-start: 2px; --padding-end: 2px;">
            <ion-icon slot="icon-only" name="log-out-outline" style="font-size: 1.3rem;"></ion-icon>
          </ion-button>
        </ng-container>

        <ion-button *ngIf="isGuest()" (click)="iraLogin()"
          style="--color: #1e3a8a; font-weight: 700; font-size: 0.85rem;">
          Entrar
        </ion-button>
      </div>

    </div>

    <!-- The rest of the 110px height is empty space BELOW the buttons -->

  </ion-toolbar>
</ion-header>
