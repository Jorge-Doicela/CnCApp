<ion-header class="ion-no-border">
  <ion-toolbar
    style="--background: #ffffff; border-bottom: 2px solid #f1f5f9; --min-height: 110px; height: 110px; position: relative;">

    <div
      style="width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px 0 20px;">

      <!-- Left: Brand (Cleaned, NO ICON per user request) -->
      <div style="display: flex; align-items: center; gap: 4px; flex: 0 0 auto;">
        <ion-menu-button style="color: #475569; margin: 0; --padding-start: 0;"></ion-menu-button>
        <div style="border-left: 2px solid #1e3a8a; padding-left: 12px; line-height: 1.15; margin-left: 5px;">
          <div style="font-weight: 900; color: #1e3a8a; font-size: 1.1rem; letter-spacing: -0.5px;">CNC</div>
          <div
            style="font-size: 0.7rem; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">
            Ecuador</div>
        </div>
      </div>

      <!-- CENTER: Encapsulated Navigation (ALL LINKS included) -->
      <div class="desktop-only" style="display: flex; justify-content: center; flex: 1; padding: 0 20px;">
        <div class="encased-pill-system">
          <div (click)="navegarModulo('historia')" class="encased-item">Historia</div>
          <div (click)="navegarModulo('direccion')" class="encased-item">Dirección</div>
          <div (click)="navegarModulo('norma-regul')" class="encased-item">Normativa</div>
          <div (click)="navegarModulo('informacion')" class="encased-item">Información</div>
          <div (click)="navegarModulo('servi-progra')" class="encased-item">Servicios</div>
          <div (click)="navegarModulo('validar-certificados')" class="encased-item">Verificación</div>
        </div>
      </div>

      <!-- Right: Encapsulated Auth/User -->
      <div style="display: flex; align-items: center; gap: 15px; flex: 0 0 auto; justify-content: flex-end;">

        <!-- Guest: Encapsulated Auth -->
        <ng-container *ngIf="isGuest()">
          <div class="encased-auth-frame desktop-only">
            <div (click)="iraLogin()" class="auth-box login">
              <ion-icon name="log-in-outline"></ion-icon>
              <span>Entrar</span>
            </div>
            <div (click)="iraRegistro()" class="auth-box register">
              <ion-icon name="person-add-outline"></ion-icon>
              <span>Crear Cuenta</span>
            </div>
          </div>

          <!-- Mobile Login Only Button -->
          <ion-button *ngIf="isGuest()" (click)="iraLogin()" class="mobile-only-btn login-button">
            Entrar
          </ion-button>
        </ng-container>

        <!-- Logged In User -->
        <ng-container *ngIf="!isGuest()">
          <div (click)="navegarModulo('Ver Perfil')" class="user-encased">
            <div class="user-avatar-circle">{{ (userName() || 'U').charAt(0).toUpperCase() }}</div>
            <span class="user-label">{{ (userName() || '').split(' ')[0] }}</span>
          </div>
          <ion-button (click)="cerrarSesion()" style="--color: #ef4444; margin: 0;">
            <ion-icon slot="icon-only" name="log-out-outline" style="font-size: 1.5rem;"></ion-icon>
          </ion-button>
        </ng-container>

      </div>

    </div>

    <!-- Bottom spacing for Android safety -->
  </ion-toolbar>
</ion-header>

<style>
  /* Navigation Central - Encased Style (All Links) */
  .encased-pill-system {
    display: flex;
    align-items: center;
    background: #f1f5f9;
    padding: 4px;
    border-radius: 999px;
    border: 1px solid rgba(0, 0, 0, 0.03);
    gap: 4px;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.02);
  }

  .encased-item {
    padding: 8px 18px;
    font-size: 0.8rem;
    font-weight: 700;
    color: #475569;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
  }

  .encased-item:hover {
    background: #ffffff;
    color: #1e3a8a;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    transform: translateY(-1px);
  }

  /* Right Side Auth - Encapsulated */
  .encased-auth-frame {
    display: flex;
    align-items: center;
    background: #f1f5f9;
    padding: 5px;
    border-radius: 999px;
    border: 1px solid rgba(0, 0, 0, 0.03);
    gap: 6px;
  }

  .auth-box {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 999px;
    font-weight: 800;
    font-size: 0.78rem;
    transition: all 0.3s ease;
  }

  .auth-box.login {
    color: #1e3a8a;
  }

  .auth-box.login:hover {
    background: rgba(255, 255, 255, 0.5);
  }

  .auth-box.register {
    background: #ffffff;
    color: #1e3a8a;
    box-shadow: 0 3px 8px rgba(0, 0, 0, 0.06);
  }

  .auth-box.register:hover {
    transform: translateY(-1px);
    box-shadow: 0 5px 12px rgba(0, 0, 0, 0.08);
  }

  /* User Section */
  .user-encased {
    display: flex;
    align-items: center;
    background: #f1f5f9;
    padding: 3px 15px 3px 3px;
    border-radius: 999px;
    gap: 10px;
    cursor: pointer;
  }

  .user-avatar-circle {
    background: #1e3a8a;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 0.85rem;
  }

  .user-label {
    font-weight: 800;
    font-size: 0.75rem;
    color: #1e3a8a;
    text-transform: uppercase;
  }

  /* Responsive Constraints */
  .desktop-only {
    display: flex;
  }

  .mobile-only-btn {
    display: none;
  }

  @media (max-width: 1200px) {
    .desktop-only {
      display: none !important;
    }

    .mobile-only-btn {
      display: block !important;
    }
  }

  .login-button {
    --background: #1e3a8a;
    --color: #ffffff;
    --border-radius: 999px;
    font-weight: 800;
    height: 34px;
    margin: 0;
  }
</style>
